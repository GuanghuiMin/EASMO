# Smoke-test config for LongMemEval. 2 contexts × 3 agents × 1 budget.

experiment:
  name: motivation-smoke-longmemeval
  output_dir: outputs/smoke_longmemeval
  seed: 42

wandb:
  enabled: true
  project: easmo-motivation
  tags: [smoke, m1, longmemeval]
  group: smoke-longmemeval

llm:
  base_url: ${oc.env:NOKIA_LLM_BASE_URL,http://10.183.22.68:8005/v1}
  model_id: ${oc.env:NOKIA_LLM_MODEL_ID,MiniMaxAI/MiniMax-M2.5}
  api_key: EMPTY
  request_timeout_s: 180
  max_concurrent: 4
  retry_attempts: 3
  retry_backoff_s: 5

data:
  source: longmemeval
  data_path: /workspace/.cache/huggingface/hub/datasets--xiaowu0162--longmemeval/snapshots/2ec2a557f339b6c0369619b1ed5793734cc87533/longmemeval_oracle
  max_contexts: 2
  max_context_tokens: 6000

agents:
  - id: A_react
    scaffold: react
  - id: A_plan
    scaffold: plan
  - id: A_cot
    scaffold: cot

budgets: [256]
samples_per_state: 4

m1:
  candidate_top_k: 3
  action_match_pass: 0.85
