# Default ("full") motivation experiment config.
#
# Conservative defaults — adjust max_contexts upward as the smoke test
# proves stable. Stays well under the original spec's 500-context plan so
# that one engineer can iterate in a working day.

experiment:
  name: motivation-default
  output_dir: outputs/default
  seed: 42

wandb:
  enabled: true
  project: easmo-motivation
  entity: null
  tags: [m1, m2, m3]
  group: default

llm:
  base_url: ${oc.env:NOKIA_LLM_BASE_URL,http://10.183.22.68:8005/v1}
  model_id: ${oc.env:NOKIA_LLM_MODEL_ID,MiniMaxAI/MiniMax-M2.5}
  api_key: EMPTY
  request_timeout_s: 180
  max_concurrent: 8
  retry_attempts: 3
  retry_backoff_s: 5

data:
  source: appworld
  appworld_split: train       # ~ tasks listed in train.txt
  max_contexts: 30            # ramp up later
  probe_states_per_context: 6
  trajectory_glob: /workspace/acon/experiments/appworld/outputs/MiniMaxAI_MiniMax-M2.5_minimax_tiny/train_tiny/task_*/appworld_trajectory.json
  max_context_tokens: 8000

agents:
  - id: A_react
    scaffold: react
  - id: A_plan
    scaffold: plan
  - id: A_cot
    scaffold: cot

budgets: [128, 256, 512, 1024]
samples_per_state: 8

m1:
  candidate_top_k: 5
  action_match_pass: 0.85

m2:
  saliency_max_tokens: 800    # cap saliency loop for speed (full would be ~8k tokens)
  saliency_examples: 3        # how many illustrative heatmaps to save

m3:
  divergence_probe_states: 20
